# ── Benchmark: MMMU Pro ─────────────────────────────────────────────────
# Multi-image multiple-choice benchmark (up to 7 images, 10 options A-J).
# Evaluation uses LLM-as-judge (GPT-4o) — aligned with lmms-eval-new.
#
# models[0] = Kimi instant (cheap, loops > 0)
# models[1] = Kimi thinking (expensive, loop 0)
#
# Prepare data first:
#   python benchmarks/prepare_data.py --benchmark mmmu_pro
#
# Run:
#   squeeze-evolve-client --config <this_file> --input data/mmmu_pro/test.parquet

run_name: mmmu_pro_kimi

routing:
  k: 4
  population: 16
  groups: 16
  loops: 5
  confidence_percentiles: []
  fitness: diversity
  selection: uniform
  selection_temperature: 1.0
  update: replace
  lite_fraction: 0.0
  lite_method: majority
  recombination: mmmu_pro-aggregate
  evaluation: mmmu_pro-judge
  task: mmmu_pro
  generation_batch_size: 16
  seed: 1234

  multimodal: true
  include_images_in_recombination: true

models:
  # model_0: Kimi instant (no thinking) — routed for loops > 0
  - name: together_sso/moonshotai/Kimi-K2.5-afd8f13f
    base_url: https://api.together.xyz/v1
    api_key: <TOGETHER_API_KEY>
    endpoint: chat
    max_tokens: 64000
    temperature: 0.6
    top_p: 0.95
    max_concurrency: 24
    extra_body:
      thinking: false

  # model_1: Kimi thinking — used for loop 0 initial population
  - name: together_sso/moonshotai/Kimi-K2.5-afd8f13f
    base_url: https://api.together.xyz/v1
    api_key: <TOGETHER_API_KEY>
    endpoint: chat
    max_tokens: 64000
    temperature: 1.0
    top_p: 0.95
    max_concurrency: 24

# Judge model for LLM-as-judge evaluation
judge_model:
  name: gpt-4o
  base_url: https://api.openai.com/v1
  api_key: <OPENAI_API_KEY>
  endpoint: chat
  max_tokens: 64
  temperature: 0.0
  max_concurrency: 16

retry:
  request_timeout_seconds: 300

resume: true
checkpoint_dir: ./artifacts/mmmu_pro/example/checkpoints
metrics_path: ./artifacts/mmmu_pro/example/metrics.json
